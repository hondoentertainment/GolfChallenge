name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 20

      - name: Test with coverage
        run: npm test -- --ci --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 30
          if-no-files-found: warn

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Coverage summary:');
              console.log('  Lines:      ' + c.lines.pct + '%');
              console.log('  Statements: ' + c.statements.pct + '%');
              console.log('  Functions:  ' + c.functions.pct + '%');
              console.log('  Branches:   ' + c.branches.pct + '%');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost/fake

  deploy:
    name: Deploy to Vercel
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Vercel auto-deploys via the GitHub integration. This job is a no-op
      # placeholder that proves CI gating: it only runs after `ci` passes on
      # main, signalling green-light for the auto-deploy that Vercel triggers
      # in parallel. If you want CI-driven deploys (instead of Vercel's auto
      # integration), uncomment the steps below and add VERCEL_TOKEN +
      # VERCEL_ORG_ID + VERCEL_PROJECT_ID secrets to the repo.
      - name: Deploy gate (no-op)
        run: |
          echo "CI passed on main → Vercel auto-deploy proceeds." >> $GITHUB_STEP_SUMMARY
          echo "To switch to CI-driven deploy, add Vercel CLI step + secrets." >> $GITHUB_STEP_SUMMARY

      # - name: Install Vercel CLI
